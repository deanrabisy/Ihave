}).onfinish = () => confetti.remove();
}
}

async function enterGame(){
const enterBtn = document.getElementById("enterBtn");
const loginStatus = document.getElementById("loginStatus");
enterBtn.disabled = true;
enterBtn.textContent = "Entering...";
loginStatus.textContent = "Joining room...";
try{
myName=document.getElementById("nameInput").value||"player";
let params=new URLSearchParams(location.search);
roomId=params.get("room");

if(!roomId){
roomId="room"+Math.floor(Math.random()*999999);
await set(ref(db,"rooms/"+roomId),{state:"waiting",players:{}});
isHost=true;
startBtn.style.display="inline-block";
}else{
const existingRoomSnap = await get(ref(db,"rooms/"+roomId));
if(!existingRoomSnap.exists()){
throw new Error("Room not found. Ask the host for a fresh link.");
}
isHost=false;
startBtn.style.display="none";
}

const link=location.origin+location.pathname+"?room="+roomId;
if(isHost){
document.getElementById("share").innerHTML="Send link to student:<br>"+link;
} else {
document.getElementById("share").innerHTML=""; // Student doesn't see link
}

await update(ref(db,"rooms/"+roomId+"/players/"+playerId),{name:myName});
home.style.display="none";
lobby.style.display="block";
loginStatus.textContent = "";
listenRoom();
scheduleCardImagePreload();

// Connect to WebSocket server for battles
console.log("Connecting to battle server:", BATTLE_SERVER);
socket = io(BATTLE_SERVER, {
transports: ['websocket', 'polling'],
reconnection: true
});

socket.on('connect', () => {
console.log('Connected to battle server, socket ID:', socket.id);
socket.emit('join_room', { roomId, playerId, isHost });
console.log('Sent join_room:', { roomId, playerId, isHost });
});

socket.on('connect_error', (error) => {
console.error('Connection error:', error);
});

socket.on('disconnect', (reason) => {
console.warn('Disconnected from battle server:', reason);
});

socket.on('battle_start', (battle) => {
console.log('Battle started:', battle);
clearPendingPlayVisuals();
handleBattleStart(battle);
});

socket.on('battle_update', ({ clicks1, clicks2 }) => {
console.log('Battle update:', clicks1, 'vs', clicks2);
updateBattleClicks(clicks1, clicks2);
});

socket.on('battle_result', (result) => {
console.log('Battle result:', result);
handleBattleResult(result);
});

socket.on('card_play_intent', ({ playerId: intentPlayerId, card, playId }) => {
if(!card) return;
if(intentPlayerId === playerId){
if(playId && playId !== activePlayId) return;
if(String(localMovementStartedFor) === String(card.id)) return;
}
setFlowPhase(FLOW_PHASES.CARD_MOVING);
animateCardToCenter(card, intentPlayerId);
});

socket.on('card_play_blocked', ({ playerId: blockedPlayerId, card, reason, blockedByPlayerId, playId }) => {
if(!card) return;
if(blockedPlayerId === playerId && playId && playId !== activePlayId){
console.warn("Ignoring stale block for previous play:", playId, "current:", activePlayId);
return;
}
const blockedKey = movementKey(card, blockedPlayerId);
const isOwnActiveCard = blockedPlayerId === playerId && (
activeMovementClones.has(blockedKey) ||
String(pendingCardId) === String(card.id) ||
String(localMovementStartedFor) === String(card.id)
);
if(isOwnActiveCard && (!blockedByPlayerId || (blockedByPlayerId === playerId && ["pending_play"].includes(reason)))){
console.warn("Ignoring self-block for active moving card:", reason || "unknown", blockedByPlayerId || "unknown blocker");
return;
}
setFlowPhase(FLOW_PHASES.NEAR_BLOCK);
if(blockedPlayerId === playerId){
clearPendingPlayVisuals();
}
animateBlockedCardToCenter(card, blockedPlayerId, `server_${reason || "blocked"}_by_${blockedByPlayerId || "unknown"}`);
if(blockedPlayerId === playerId){
markMovementBlocked(card.id, playerId);
}
setTimeout(() => {
if(!battleState && (!currentChain || currentChain.flipped)){
setFlowPhase(FLOW_PHASES.HAND_READY);
}
}, CARD_TRAVEL_MS + 320);
});

socket.on('play_card_now', ({ card, playId }) => {
if(playId && playId !== activePlayId){
console.warn("Ignoring stale play_card_now:", playId, "current:", activePlayId);
return;
}
console.log('SERVER SAYS: Play card now (no battle)');
console.log('   Card:', card.iHave);
console.log('   My hand before:', myHand.map(c => c.iHave));
playCardNow(card);
console.log('   My hand after:', myHand.map(c => c.iHave));
});

socket.on('play_rejected', ({ reason, blockedByPlayerId, playId }) => {
console.warn('Card play rejected by server:', reason);
if(playId && playId !== activePlayId){
console.warn("Ignoring stale play rejection:", playId, "current:", activePlayId);
return;
}
if(["center_reserved", "awaiting_flip", "battle_active"].includes(reason)){
console.warn("Server rejected moving card; waiting for block animation event", reason);
const fallbackPendingCardId = pendingCardId;
setTimeout(() => {
if(pendingCardId === null || String(pendingCardId) !== String(fallbackPendingCardId)) return;
const fallbackCard = myHand.find(c => String(c.id) === String(fallbackPendingCardId));
if(!fallbackCard) return;
console.warn("Block animation event fallback triggered for", reason);
clearPendingPlayVisuals();
animateBlockedCardToCenter(fallbackCard, playerId, `play_rejected_${reason}_fallback`);
markMovementBlocked(fallbackPendingCardId, playerId);
if(!battleState && (!currentChain || currentChain.flipped)){
setFlowPhase(FLOW_PHASES.HAND_READY);
}
}, 120);
return;
}
const rejectedCardIsMoving = pendingCardId !== null && (
activeMovementClones.has(movementKey({id: pendingCardId}, playerId)) ||
String(localMovementStartedFor) === String(pendingCardId)
);
if(rejectedCardIsMoving && (blockedByPlayerId === playerId || (!blockedByPlayerId && ["center_reserved", "awaiting_flip", "battle_active", "pending_play"].includes(reason)))){
console.warn("Ignoring late self-rejection for active moving card");
return;
}
cancelMovement(pendingCardId, playerId);
clearPendingPlayVisuals();
renderHand();
if(!battleState){
setFlowPhase(currentChain && !currentChain.flipped ? FLOW_PHASES.CENTER_WAITING_FLIP : FLOW_PHASES.HAND_READY);
}
});
}catch(error){
console.error("Unable to enter game:", error);
loginStatus.textContent = error && error.message ? error.message : "Could not join. Please try again.";
enterBtn.disabled = false;
enterBtn.textContent = "Enter";
}
}

async function startGame(){
if(!isHost) return;
preloadCardImages();

// Hide overlay if visible (game restart)
const overlay = document.getElementById("cardOverlay");
overlay.classList.remove("visible");
document.getElementById("overlayCards").innerHTML = "";
clearPendingPlayVisuals();
roundWinnerShownFor = null;
setFlowPhase(FLOW_PHASES.ARRANGING);

let deck=makeDeck();
let playersSnap=await get(ref(db,"rooms/"+roomId+"/players"));
let ids=Object.keys(playersSnap.val());
let hands={};
let organizationReady={};

// Deal cards and convert arrays to objects for Firebase
ids.forEach((id,i)=>{
let playerCards = deck.filter((_,idx)=>idx%ids.length===i);
let handObj = {};
playerCards.forEach((c, idx) => handObj[idx] = c);
hands[id] = handObj;
organizationReady[id] = false;
});

// Get existing scores or initialize
let scoresSnap = await get(ref(db,"rooms/"+roomId+"/scores"));
let scores = scoresSnap.val() || {};
ids.forEach(id => {
if(!scores[id]) scores[id] = 0;
});

await update(ref(db,"rooms/"+roomId),{
state:"playing",
hands:hands,
chain:null,
chainBroken:false,
winner:null,
countdownStartedAt:null,
scores:scores,
pileOrganization:null,
organizationReady:organizationReady,
roundStartedAt: Date.now()
});
if(socket && socket.connected){
socket.emit('game_reset', { roomId, playerId });
}
}
deck.onclick=flipCard;
document.getElementById("enterBtn").onclick=enterGame;
startBtn.onclick=startGame;
restartBtn.onclick=startGame; // Reuse startGame function for restart
document.getElementById("readyBtn").onclick=handleReadyClick;
</script>
